<svg viewBox="0 0 1200 880" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Noto Sans SC', sans-serif" role="img" aria-label="AICC 认知闭环飞轮：感知 → 选择 → 内化 → 整合 → 再次感知">
  <defs>
    <marker id="ah-blue" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3E6FB0"/></marker>
    <marker id="ah-purple" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6E54C8"/></marker>
    <marker id="ah-amber" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#C0862F"/></marker>
    <marker id="ah-green" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2F8A6B"/></marker>
  </defs>

  <rect x="0" y="0" width="1200" height="880" fill="#F6F8FC"/>

  <!-- Header -->
  <text x="70" y="66" fill="#5B7FC0" font-size="15" font-weight="600" letter-spacing="3">AICC COGNITIVE FLYWHEEL</text>
  <text x="70" y="116" fill="#1F2937" font-size="42" font-weight="700">AICC 认知闭环</text>
  <text x="70" y="152" fill="#6B7280" font-size="17">从全球趋势感知，到知识图谱驱动的认知体系持续更新</text>

  <!-- ===== Cards ===== -->
  <!-- 01 SENSE (top-left, blue) -->
  <g>
    <rect x="70" y="208" width="450" height="206" rx="16" fill="#FFFFFF" stroke="#E3E8F0"/>
    <rect x="70" y="208" width="7" height="206" rx="3.5" fill="#3E6FB0"/>
    <rect x="100" y="236" width="46" height="26" rx="8" fill="#EAF0FA"/>
    <text x="123" y="254" fill="#3E6FB0" font-size="15" font-weight="700" text-anchor="middle">01</text>
    <text x="160" y="254" fill="#3E6FB0" font-size="14" font-weight="600" letter-spacing="1">SENSE · 感知</text>
    <text x="490" y="254" fill="#5B7FC0" font-size="12.5" text-anchor="end">全球扫描 · 持续捕捉</text>
    <text x="100" y="312" fill="#1F2937" font-size="26" font-weight="700">AICC 认知雷达</text>
    <text x="100" y="348" fill="#6B7280" font-size="15">及时感知全球最新 AI 技术趋势</text>
    <text x="100" y="374" fill="#6B7280" font-size="15">与认知知识点</text>
  </g>

  <!-- 02 SELECT (top-right, purple) -->
  <g>
    <rect x="680" y="208" width="450" height="206" rx="16" fill="#FFFFFF" stroke="#E3E8F0"/>
    <rect x="680" y="208" width="7" height="206" rx="3.5" fill="#6E54C8"/>
    <rect x="710" y="236" width="46" height="26" rx="8" fill="#EFEBFA"/>
    <text x="733" y="254" fill="#6E54C8" font-size="15" font-weight="700" text-anchor="middle">02</text>
    <text x="770" y="254" fill="#6E54C8" font-size="14" font-weight="600" letter-spacing="1">SELECT · 选择</text>
    <text x="1100" y="254" fill="#8B73D6" font-size="12.5" text-anchor="end">聚焦高价值认知</text>
    <text x="710" y="312" fill="#1F2937" font-size="26" font-weight="700">认知点筛选</text>
    <text x="710" y="348" fill="#6B7280" font-size="15">从最新认知点中筛选</text>
    <text x="710" y="374" fill="#6B7280" font-size="15">选择要深入理解与内化的认知点</text>
  </g>

  <!-- 04 INTEGRATE (bottom-left, green) -->
  <g>
    <rect x="70" y="468" width="450" height="206" rx="16" fill="#FFFFFF" stroke="#E3E8F0"/>
    <rect x="70" y="468" width="7" height="206" rx="3.5" fill="#2F8A6B"/>
    <rect x="100" y="496" width="46" height="26" rx="8" fill="#E6F2EC"/>
    <text x="123" y="514" fill="#2F8A6B" font-size="15" font-weight="700" text-anchor="middle">04</text>
    <text x="160" y="514" fill="#2F8A6B" font-size="14" font-weight="600" letter-spacing="1">INTEGRATE · 整合</text>
    <text x="490" y="514" fill="#3F9C7C" font-size="12.5" text-anchor="end">图谱连接 · 动态迭代</text>
    <text x="100" y="572" fill="#1F2937" font-size="26" font-weight="700">知识图谱整合</text>
    <text x="100" y="608" fill="#6B7280" font-size="15">整合所有知识点，交由 AI 识别连接强弱</text>
    <text x="100" y="634" fill="#6B7280" font-size="15">定期更新大脑认知体系</text>
  </g>

  <!-- 03 LEARN (bottom-right, amber) -->
  <g>
    <rect x="680" y="468" width="450" height="206" rx="16" fill="#FFFFFF" stroke="#E3E8F0"/>
    <rect x="680" y="468" width="7" height="206" rx="3.5" fill="#C0862F"/>
    <rect x="710" y="496" width="46" height="26" rx="8" fill="#FAF0DC"/>
    <text x="733" y="514" fill="#B5751A" font-size="15" font-weight="700" text-anchor="middle">03</text>
    <text x="770" y="514" fill="#B5751A" font-size="14" font-weight="600" letter-spacing="1">LEARN · 内化</text>
    <text x="1100" y="514" fill="#C0862F" font-size="12.5" text-anchor="end">复述 · 检验 · 补缺</text>
    <text x="710" y="572" fill="#1F2937" font-size="26" font-weight="700">费曼学习法</text>
    <text x="710" y="608" fill="#6B7280" font-size="15">将每一个认知点通过费曼学习法</text>
    <text x="710" y="634" fill="#6B7280" font-size="15">转化为可解释、可迁移的理解</text>
  </g>

  <!-- ===== Loop arrows (clockwise: 01→02→03→04→01) ===== -->
  <path d="M495,322 Q600,250 685,322" fill="none" stroke="#3E6FB0" stroke-width="2.4" stroke-dasharray="2 9" stroke-linecap="round" marker-end="url(#ah-blue)"/>
  <path d="M735,360 Q815,440 735,520" fill="none" stroke="#6E54C8" stroke-width="2.4" stroke-dasharray="2 9" stroke-linecap="round" marker-end="url(#ah-purple)"/>
  <path d="M705,560 Q600,632 515,560" fill="none" stroke="#C0862F" stroke-width="2.4" stroke-dasharray="2 9" stroke-linecap="round" marker-end="url(#ah-amber)"/>
  <path d="M465,520 Q385,440 465,360" fill="none" stroke="#2F8A6B" stroke-width="2.4" stroke-dasharray="2 9" stroke-linecap="round" marker-end="url(#ah-green)"/>

  <!-- ===== Center ===== -->
  <circle cx="600" cy="441" r="118" fill="#1D6B66"/>
  <circle cx="600" cy="441" r="118" fill="none" stroke="#3E8C82" stroke-width="1" stroke-dasharray="2 6" opacity="0.5"/>
  <text x="600" y="400" fill="#9FD6CC" font-size="13" letter-spacing="3" text-anchor="middle">AICC</text>
  <text x="600" y="446" fill="#FFFFFF" font-size="36" font-weight="700" text-anchor="middle">认知闭环</text>
  <text x="600" y="476" fill="#BFE3DC" font-size="13" text-anchor="middle">持续进化的大脑认知体系</text>
  <line x1="545" y1="494" x2="655" y2="494" stroke="#3E8C82" stroke-width="1"/>
  <text x="558" y="522" fill="#CDEAE4" font-size="12.5" text-anchor="middle">感知</text>
  <text x="586" y="522" fill="#CDEAE4" font-size="12.5" text-anchor="middle">选择</text>
  <text x="614" y="522" fill="#CDEAE4" font-size="12.5" text-anchor="middle">内化</text>
  <text x="642" y="522" fill="#CDEAE4" font-size="12.5" text-anchor="middle">整合</text>

  <!-- ===== Bottom legend ===== -->
  <line x1="70" y1="724" x2="1130" y2="724" stroke="#E3E8F0" stroke-width="1"/>
  <text x="70" y="772" fill="#5B7FC0" font-size="14" font-weight="600">01 感知</text>
  <text x="172" y="772" fill="#C0C7D2" font-size="14">→</text>
  <text x="200" y="772" fill="#8B73D6" font-size="14" font-weight="600">02 选择</text>
  <text x="302" y="772" fill="#C0C7D2" font-size="14">→</text>
  <text x="330" y="772" fill="#C0862F" font-size="14" font-weight="600">03 理解内化</text>
  <text x="462" y="772" fill="#C0C7D2" font-size="14">→</text>
  <text x="490" y="772" fill="#3F9C7C" font-size="14" font-weight="600">04 整合更新</text>
  <text x="622" y="772" fill="#C0C7D2" font-size="14">→</text>
  <text x="650" y="772" fill="#6B7280" font-size="14">再次感知</text>
  <text x="1130" y="772" fill="#9AA3B2" font-size="13.5" text-anchor="end">持续连接 · 持续验证 · 持续重构</text>
</svg>
